<!DOCTYPE html>
<html>
<head>
  <title>Library System</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6fb;
    }

    header {
      background: #4a6cf7;
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      color: #333;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .book-card {
      background: #fafafa;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #eee;
      cursor: pointer;
      transition: 0.2s;
    }

    .book-card:hover {
      background: #eef1ff;
      border-color: #4a6cf7;
    }

    .selected {
      border: 2px solid #4a6cf7;
      background: #eef1ff;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #4a6cf7;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #3a55d1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f1f3f7;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
    }

    .pickup {
      background: #e0f7fa;
      color: #00796b;
    }

    .delivery {
      background: #fff3e0;
      color: #e65100;
    }
  </style>
</head>

<body>

<header>📚 Online Library System</header>

<div class="container">

  <!-- BOOKS -->
  <div class="section">
    <h2>1️⃣ Browse Books</h2>
    <div id="books" class="books"></div>
  </div>

  <!-- REQUEST -->
  <div class="section">
    <h2>2️⃣ Request Selected Book</h2>

    <input id="name" placeholder="Your Name">

    <select id="type">
      <option value="pickup">Pickup from Library</option>
      <option value="delivery">Home Delivery</option>
    </select>

    <input id="address" placeholder="Enter address (only for delivery)">

    <button onclick="requestBook()">Request Book</button>
  </div>

  <!-- ORDERS -->
  <div class="section">
    <h2>3️⃣ Your Orders</h2>
    <button onclick="loadOrders()">Refresh</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Book</th>
          <th>Type</th>
        </tr>
      </thead>
      <tbody id="orders"></tbody>
    </table>
  </div>

</div>

<script>
let selectedBookId = null;

async function loadBooks() {
  const res = await fetch('/books');
  const data = await res.json();

  document.getElementById('books').innerHTML =
    data.map(b => `
      <div class="book-card" onclick="selectBook(${b.id}, this)">
        <strong>${b.name}</strong><br>
        <small>Click to select</small>
      </div>
    `).join('');
}

function selectBook(id, element) {
  selectedBookId = id;

  document.querySelectorAll('.book-card')
    .forEach(el => el.classList.remove('selected'));

  element.classList.add('selected');
}

async function requestBook() {
  const userName = document.getElementById('name').value;
  const type = document.getElementById('type').value;
  const address = document.getElementById('address').value;

  if (!selectedBookId) {
    alert("Please select a book first!");
    return;
  }

  await fetch('/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      userName,
      bookId: selectedBookId,
      type,
      address
    })
  });

  alert("✅ Request sent!");
  loadOrders();
}

async function loadOrders() {
  const res = await fetch('/orders');
  const data = await res.json();

  document.getElementById('orders').innerHTML =
    data.map(o => `
      <tr>
        <td>${o.id}</td>
        <td>${o.userName}</td>
        <td>Book ${o.bookId}</td>
        <td>
          <span class="tag ${o.type}">
            ${o.type}
          </span>
        </td>
      </tr>
    `).join('');
}

// Load books on start
loadBooks();
</script>

</body>
</html>
