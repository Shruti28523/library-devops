<!DOCTYPE html>
<html>
<head>
  <title>Online Library</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f7;
    }

    header {
      background: linear-gradient(to right, #4a6cf7, #5f7cff);
      color: white;
      padding: 15px 30px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
    }

    button {
      background: #4a6cf7;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background: #3c58d1;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background: #f3f4f6;
    }

    .status {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
    }

    .pending {
      background: #ffe4b5;
      color: #b7791f;
    }

    .completed {
      background: #d4edda;
      color: #155724;
    }
  </style>
</head>

<body>

<header>
  📚 Online Library System
</header>

<div class="container">

  <!-- Books -->
  <div class="card">
    <h2>📖 Available Books</h2>
    <button onclick="loadBooks()">Load Books</button>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Book Title</th>
        </tr>
      </thead>
      <tbody id="books"></tbody>
    </table>
  </div>

  <!-- Request -->
  <div class="card">
    <h2>📦 Request a Book</h2>

    <label>Your Name</label>
    <input id="name">

    <label>Book</label>
    <select id="bookId">
      <option value="1">Harry Potter</option>
      <option value="2">Atomic Habits</option>
      <option value="3">Rich Dad Poor Dad</option>
    </select>

    <label>Request Type</label>
    <select id="type">
      <option value="pickup">Pickup</option>
      <option value="delivery">Delivery</option>
    </select>

    <label>Address (if delivery)</label>
    <input id="address">

    <button onclick="requestBook()">Request Book</button>
  </div>

  <!-- Orders -->
  <div class="card">
    <h2>📋 Current Orders</h2>
    <button onclick="loadOrders()">View Orders</button>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>User</th>
          <th>Book</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="orders"></tbody>
    </table>
  </div>

</div>

<script>
async function loadBooks() {
  const res = await fetch('/books');
  const data = await res.json();

  document.getElementById('books').innerHTML =
    data.map((b, i) => `
      <tr>
        <td>${i+1}</td>
        <td>${b.name}</td>
      </tr>
    `).join('');
}

async function requestBook() {
  const userName = document.getElementById('name').value;
  const bookId = document.getElementById('bookId').value;
  const type = document.getElementById('type').value;
  const address = document.getElementById('address').value;

  await fetch('/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userName, bookId, type, address })
  });

  alert("Book requested!");
}

async function loadOrders() {
  const res = await fetch('/orders');
  const data = await res.json();

  document.getElementById('orders').innerHTML =
    data.map(o => `
      <tr>
        <td>${o.id}</td>
        <td>${o.userName}</td>
        <td>Book ${o.bookId}</td>
        <td>
          <span class="status ${o.status.toLowerCase()}">
            ${o.status}
          </span>
        </td>
      </tr>
    `).join('');
}
</script>

</body>
</html>
