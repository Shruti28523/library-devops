<!DOCTYPE html>
<html>
<head>
  <title>Library System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
    }

    header {
      background: #4a6cf7;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      flex: 1;
    }

    h2 {
      margin-top: 0;
    }

    button {
      background: #4a6cf7;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #3a55d1;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    ul {
      padding-left: 20px;
    }

    .status {
      font-weight: bold;
    }

    .pending {
      color: orange;
    }

    .completed {
      color: green;
    }
  </style>
</head>

<body>

<header>
  📚 Online Library System
</header>

<div class="container">

  <!-- Books -->
  <div class="card">
    <h2>📖 Books</h2>
    <button onclick="loadBooks()">Load Books</button>
    <ul id="books"></ul>
  </div>

  <!-- Request -->
  <div class="card">
    <h2>📦 Request Book</h2>
    <input id="name" placeholder="Your Name">
    
    <select id="bookId">
      <option value="1">Harry Potter</option>
      <option value="2">Atomic Habits</option>
      <option value="3">Rich Dad Poor Dad</option>
    </select>

    <select id="type">
      <option value="pickup">Pickup</option>
      <option value="delivery">Delivery</option>
    </select>

    <input id="address" placeholder="Address (for delivery)">

    <button onclick="requestBook()">Request Book</button>
  </div>

  <!-- Orders -->
  <div class="card">
    <h2>📋 Orders</h2>
    <button onclick="loadOrders()">Refresh Orders</button>
    <ul id="orders"></ul>
  </div>

</div>

<script>
async function loadBooks() {
  const res = await fetch('/books');
  const data = await res.json();

  document.getElementById('books').innerHTML =
    data.map(b => `<li>${b.name}</li>`).join('');
}

async function requestBook() {
  const userName = document.getElementById('name').value;
  const bookId = document.getElementById('bookId').value;
  const type = document.getElementById('type').value;
  const address = document.getElementById('address').value;

  await fetch('/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userName, bookId, type, address })
  });

  alert("✅ Book requested successfully!");
}

async function loadOrders() {
  const res = await fetch('/orders');
  const data = await res.json();

  document.getElementById('orders').innerHTML =
    data.map(o => `
      <li>
        ${o.userName} → Book ${o.bookId} (${o.type})
        <span class="status ${o.status.toLowerCase()}">[${o.status}]</span>
      </li>
    `).join('');
}
</script>

</body>
</html>
